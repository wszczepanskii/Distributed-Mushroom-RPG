# RabbitMQ message broker for fanout game-state broadcasts.
# Management UI: http://localhost:15672  (guest / guest)
services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mushroom-rpg-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Web UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
